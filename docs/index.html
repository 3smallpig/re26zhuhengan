<body>

    <!-- Timestamps put here for -->
    <div id="t01">AAAAA</div>
    <div id="t02">AAAAA</div>
    <script>
        const date = new Date();
        const date1 = date.toLocaleString("en-uk", {
            hour12: true, weekday: "short", hour: "2-digit", minute: "2-digit", second: "2-digit",
            month: "2-digit", year: "numeric", day: "2-digit"
        });
        document.getElementById("t01").innerHTML = "" + date1;
        document.getElementById("t02").innerHTML = "" + Date.now() + "</br>";
    </script>
</body>
